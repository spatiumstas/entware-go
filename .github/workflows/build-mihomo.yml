name: Build mihomo

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            packages: mihomo
          - arch: aarch64
            packages: mihomo
          - arch: armv7
            packages: mihomo
          - arch: mipsel
            packages: mihomo
          - arch: mips
            packages: mihomo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve latest mihomo version
        id: mihomo-version
        uses: actions/github-script@v8
        with:
          script: |
            const release = await github.rest.repos.getLatestRelease({
              owner: 'MetaCubeX',
              repo: 'mihomo',
            });

            core.setOutput('version', release.data.tag_name.replace(/^v/, ''));

      - name: Patch package version for CI build
        shell: bash
        run: |
          version='${{ steps.mihomo-version.outputs.version }}'
          echo "Building mihomo version: ${version}"
          sed -i -E "s/^PKG_VERSION:=.*/PKG_VERSION:=${version}/" mihomo/Makefile
          sed -i -E "s/^PKG_MIRROR_HASH:=.*/PKG_MIRROR_HASH:=skip/" mihomo/Makefile

      - name: Build mihomo packages
        uses: ownik/gh-action-entware-sdk@v1
        env:
          ARCH: ${{ matrix.arch }}
          PACKAGES: ${{ matrix.packages }}
          V: s
          FEEDNAME: local

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: mihomo-${{ steps.mihomo-version.outputs.version }}-${{ matrix.arch }}
          path: bin/targets/**/packages/mihomo_*.ipk
          if-no-files-found: warn
          compression-level: 0

  publish-latest-release:
    runs-on: ubuntu-latest
    needs: [ build ]
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: out
          merge-multiple: true

      - name: Resolve latest target release
        id: target-release
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const picked = releases.find((rel) => !rel.draft && !rel.prerelease);
            if (!picked) {
              core.setFailed('No release found to update');
              return;
            }

            core.setOutput('id', String(picked.id));
            core.setOutput('tag', picked.tag_name);

      - name: Remove previous mihomo ipk assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.target-release.outputs.id }}
        run: |
          gh api "repos/${{ github.repository }}/releases/${RELEASE_ID}/assets" \
            --jq '.[] | select(.name | test("^mihomo_.*\\.ipk$")) | .id' \
            | while read -r asset_id; do
                [ -n "$asset_id" ] || continue
                gh api -X DELETE "repos/${{ github.repository }}/releases/assets/${asset_id}"
              done

      - name: Upload new mihomo ipk assets to latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.target-release.outputs.tag }}
        run: |
          mapfile -t files < <(find out -type f -name 'mihomo_*.ipk' | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No mihomo ipk files found"
            exit 1
          fi

          printf '%s\n' "${files[@]}"
          gh release upload "$TAG" "${files[@]}" --clobber

      - name: Dispatch to feedly
        if: success()
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.AGGREGATOR_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/spatiumstas/feedly/dispatches \
            -d '{"event_type":"package-built","client_payload":{"package":"'"${{ github.repository }}"'","channel":"release","tag":"'"${{ steps.target-release.outputs.tag }}"'"}}'